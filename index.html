<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio | Daniel de Medeiros Barbosa</title>
    <style>
        :root {
            /* Gradiente de fundo: do azul mais claro para o escuro */
            --bg-top: #1e3a8a; /* Azul marinho médio */
            --bg-bottom: #020617; /* Preto azulado profundo */
            --text-main: #f8fafc;
            --text-dim: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            /* Aplicando o gradiente linear de cima para baixo */
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
            background: rgba(15, 23, 42, 0.4); /* Leve fundo escuro para o conteúdo */
            padding: 40px 30px;
            border-radius: 20px;
            backdrop-filter: blur(5px); /* Efeito de vidro esfumaçado */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            letter-spacing: -0.025em;
            color: #60a5fa; /* Azul claro para o título contrastar */
        }

        .description {
            color: var(--text-dim);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
            font-weight: 300;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-box {
            display: block;
            color: var(--text-main);
            text-decoration: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Gradiente de opacidade: do translúcido ao totalmente opaco */
        .btn-1 { background-color: rgba(59, 130, 246, 0.25); } /* Mais translúcido */
        .btn-2 { background-color: rgba(29, 114, 214, 0.50); } /* Médio translúcido */
        .btn-3 { background-color: rgba(14, 101, 189, 0.75); } /* Quase opaco */
        .btn-4 { background-color: #0077B5; border: none; }    /* Totalmente opaco (LinkedIn) */

        .link-box:hover {
            background-color: #3b82f6;
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
