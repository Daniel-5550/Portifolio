<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio | Daniel de Medeiros Barbosa</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #1e3a8a 0%, #020617 100%);
            background-attachment: fixed;
            color: #f8fafc;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            background-color: rgba(15, 23, 42, 0.6);
            padding: 40px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            color: #60a5fa;
        }

        .description {
            color: #cbd5e1;
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-box {
            display: block;
            color: #f8fafc;
            text-decoration: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Gradiente de opacidade nos botões */
        .btn-1 { background-color: rgba(59, 130, 246, 0.25); } 
        .btn-2 { background-color: rgba(29, 114, 214, 0.50); } 
        .btn-3 { background-color: rgba(14, 101, 189, 0.75); } 
        .btn-4 { background-color: #0077B5; border: none; }    

        .link-box:hover {
            background-color: #3b82f6;
            transform: translateY(-3px);
            border-color: transparent;
        }

        footer {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: #cbd5e1;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Portfólio</h1>
        
        <p class="description">
            Site feito para exposição dos links associados a carreira profissional.
        </p>

        <div class="links-container">
            <a href="https://github.com/Daniel-5550/Portifolio/tree/main/Relatorio_Tecnico_de_Implantacao" target="_blank" class="link-box btn-1">
                Relatório Técnico de Implantação
            </a>

            <a href="https://github.com/Daniel-5550/Portifolio" target="_blank" class="link-box btn-2">
                Repositório do GitHub
            </a>
            
            <a href="https://sites.google.com/view/daniel-de-medeiros-barbosa?usp=sharing" target="_blank" class="link-box btn-3">
                Site do Portfólio (Mais informações)
            </a>

            <a href="https://www.linkedin.com/in/daniel-barbosa-97339240a/" target="_blank" class="link-box btn-4">
                LinkedIn
            </a>
        </div>

        <footer>
            &copy; 2026 Daniel de Medeiros Barbosa
        </footer>
    </div>

</body>
</html>
