<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio | Daniel de Medeiros Barbosa</title>
    <style>
        :root {
            /* Gradiente de fundo: do azul mais claro para o escuro */
            --bg-top: #1e3a8a; /* Azul marinho médio */
            --bg-bottom: #020617; /* Preto azulado profundo */
            --card-bg: rgba(30, 41, 59, 0.7); /* Azul escuro semi-transparente */
            --text-main: #f8fafc;
            --text-dim: #cbd5e1;
            --accent: #3b82f6; /* Azul vibrante para o título */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            /* Aplicando o gradiente linear de cima para baixo */
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
            background: rgba(15, 23, 42, 0.4); /* Leve fundo escuro para o conteúdo */
            padding: 40px 30px;
            border-radius: 20px;
            backdrop-filter: blur(5px); /* Efeito de vidro esfumaçado */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1;
